name: Claude Code
# Per anthropic-org Phase 5 audit (2026-05-13): claude-code-action adopted as
# PoC on github-mcp first. Triggers on @claude mention in PR/issue comments.
#
# Per CLAUDE.md "Auth routing: Max → NVIDIA → API key" rule (2026-05-10):
# uses CLAUDE_CODE_OAUTH_TOKEN (Max plan, zero per-token cost) NOT
# ANTHROPIC_API_KEY (Tier 3 paid fallback).
#
# Setup: requires CLAUDE_CODE_OAUTH_TOKEN repo secret.
#   1. Run `claude setup-token` locally to mint a long-lived token
#   2. Set as repo secret: `gh secret set CLAUDE_CODE_OAUTH_TOKEN -R adelaidasofia/<repo>`
#   3. Repo admin also installs the GitHub app: `claude → /install-github-app`

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
